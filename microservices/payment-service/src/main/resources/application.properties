spring.application.name=payment-service
server.port=8093
resilience4j.circuitbreaker.instances.thirdPartyPayment.register-health-indicator=true
resilience4j.circuitbreaker.instances.thirdPartyPayment.sliding-window-size=5
resilience4j.circuitbreaker.instances.thirdPartyPayment.failure-rate-threshold=50
management.endpoints.web.exposure.include=health,info,circuitbreakers
