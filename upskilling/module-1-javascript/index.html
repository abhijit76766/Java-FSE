<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JavaScript Community Portal</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f6f8fb; color: #1f2937; }
    header, main { max-width: 1000px; margin: auto; padding: 1rem; }
    .toolbar, form { display: flex; gap: .75rem; flex-wrap: wrap; margin: 1rem 0; }
    input, select, button { padding: .65rem; font: inherit; }
    button { border: 0; border-radius: 6px; background: #2563eb; color: white; cursor: pointer; }
    .event-card { background: white; border: 1px solid #dbe4ef; border-radius: 8px; padding: 1rem; margin: .75rem 0; }
    .error { color: #b91c1c; }
    .success { color: #047857; }
    #spinner { display: none; }
  </style>
</head>
<body>
  <header>
    <h1>Community Events</h1>
    <p id="spinner">Loading events...</p>
  </header>
  <main>
    <div class="toolbar">
      <select id="categoryFilter">
        <option value="all">All categories</option>
        <option value="Music">Music</option>
        <option value="Workshop">Workshop</option>
        <option value="Sports">Sports</option>
      </select>
      <input id="searchBox" placeholder="Quick search by event name">
    </div>

    <section id="eventsContainer"></section>

    <form id="registrationForm">
      <input name="name" placeholder="Name" required>
      <input name="email" type="email" placeholder="Email" required>
      <select name="eventId" required></select>
      <button id="registerBtn" type="submit">Register</button>
      <span id="formMessage"></span>
    </form>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
